<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — MenuDirect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0F1115;
    --ink-2: #2A2D33;
    --muted: #6B6F76;
    --muted-2: #9AA0A6;
    --line: #E7E5E1;
    --line-2: #EFEDE8;
    --bg: #FAF8F5;
    --surface: #FFFFFF;
    --accent: #E8702A;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-weight: 400;
    color: var(--ink);
    background: var(--bg);
    -webkit-font-smoothing: antialiased;
    line-height: 1.5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }

  .container { max-width: 800px; margin: 0 auto; padding: 0 32px; }
  @media (max-width: 720px) { .container { padding: 0 20px; } }

  /* NAV */
  .nav {
    position: sticky; top: 0; z-index: 50;
    background: rgba(250, 248, 245, 0.85);
    backdrop-filter: saturate(140%) blur(12px);
    -webkit-backdrop-filter: saturate(140%) blur(12px);
    border-bottom: 1px solid rgba(15,17,21,0.06);
  }
  .nav-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 32px;
    display: flex; align-items: center; justify-content: space-between;
    height: 68px;
  }
  .logo {
    font-weight: 500; font-size: 17px;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .back-link {
    font-size: 14px; color: var(--muted);
    transition: color 160ms ease;
  }
  .back-link:hover { color: var(--accent); }

  /* CONTACT */
  .contact-wrapper {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 32px;
  }
  .contact-card {
    text-align: center;
    max-width: 520px;
  }
  .contact-card h1 {
    font-size: clamp(36px, 4.5vw, 52px);
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin: 0 0 16px;
  }
  .contact-card .subtitle {
    font-size: 17px;
    color: var(--muted);
    line-height: 1.55;
    margin: 0 0 48px;
  }
  .email-link {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-size: 20px;
    font-weight: 500;
    color: var(--accent);
    padding: 16px 32px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: var(--surface);
    transition: transform 200ms ease, box-shadow 200ms ease, border-color 200ms ease;
  }
  .email-link:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 28px -10px rgba(232, 112, 42, 0.2);
    border-color: var(--accent);
  }
  .email-link svg {
    width: 22px; height: 22px;
    flex-shrink: 0;
  }
  .legal-info {
    margin-top: 48px;
    font-size: 13px;
    color: var(--muted-2);
    line-height: 1.6;
  }

  /* FOOTER */
  footer {
    background: linear-gradient(to bottom, #073B33 0%, #031411 100%);
    padding: 40px 0;
    text-align: center;
  }
  .footer-inner {
    max-width: 1200px; margin: 0 auto; padding: 0 32px;
    font-size: 13px;
    color: rgba(255,255,255,0.4);
  }
  .footer-inner a {
    color: rgba(255,255,255,0.6);
    margin: 0 12px;
    transition: color 160ms ease;
  }
  .footer-inner a:hover { color: var(--accent); }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="MenuDirect.html" class="logo"><img src="logo-clean.png" alt="MenuDirect" style="height:24px;width:auto;" fetchpriority="high"></a>
    <a href="MenuDirect.html" class="back-link">← Retour au site</a>
  </div>
</nav>

<div class="contact-wrapper">
  <div class="contact-card">
    <h1>Contactez-nous</h1>
    <p class="subtitle">Une question sur SnackFlow ? On vous répond sous 48h ouvrées.</p>

    <a href="mailto:nour.aithocine@gmail.com" class="email-link">

      nour.aithocine@gmail.com
    </a>

    <p class="legal-info">ZAH Trading — 57000 Metz, France — RCS Metz 900 789 330</p>
  </div>
</div>

<footer>
  <div class="footer-inner">
    <div style="margin-bottom: 12px;">
      <a href="mentions-legales.html">Mentions légales</a>
      <a href="politique-confidentialite.html">Confidentialité</a>
      <a href="conditions-generales-vente.html">CGV</a>
    </div>
    © 2026 Snack-Flow · Luxembourg · Tous droits réservés.
  </div>
</footer>

</body>
</html>
